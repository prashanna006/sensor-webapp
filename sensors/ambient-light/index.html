<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambient Light — Sensor Visualizer</title>
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="ambient-light.css" />
</head>
<body>
  <a class="back-link" href="../../index.html">← Back</a>

  <div class="page-header">
    <h1>Ambient Light</h1>
    <p class="subtitle">Light level in lux from your environment</p>
  </div>

  <div id="unsupported-banner" class="banner hidden">
    ⚠️ Ambient Light Sensor not supported on this device or browser.
  </div>

  <div class="lux-visual">
    <div class="lux-ring" id="lux-ring">
      <div class="lux-inner">
        <span class="lux-big" id="lux-big">—</span>
        <span class="lux-unit">lux</span>
      </div>
    </div>
    <span class="lux-label" id="lux-label">Waiting...</span>
  </div>

  <div class="readouts">
    <div class="readout-card">
      <span class="label">Current</span>
      <span class="value" id="val-current">—</span>
      <span class="unit">lux</span>
    </div>
    <div class="readout-card">
      <span class="label">Min</span>
      <span class="value" id="val-min">—</span>
      <span class="unit">lux</span>
    </div>
    <div class="readout-card">
      <span class="label">Max</span>
      <span class="value" id="val-max">—</span>
      <span class="unit">lux</span>
    </div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h2>Lux Over Time</h2>
      <canvas id="chart-lux"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="ambient-light.js"></script>
</body>
</html>
