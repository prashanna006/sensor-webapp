<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyroscope — Sensor Visualizer</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" as="script">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="gyroscope.css">
</head>
<body>
  <main id="app">

    <header id="top-bar">
      <a href="../../" id="back-btn">←</a>
      <div id="page-title-wrap">
        <span id="page-label">Sensor Visualizer</span>
        <span id="page-title">Gyroscope</span>
      </div>
      <div id="status-pill">
        <span class="dot"></span>
        <span id="status-text">Waiting</span>
      </div>
    </header>

    <div id="unsupported-banner" class="banner hidden">
      ⚠️ Gyroscope not supported on this device or browser.
    </div>

    <div id="readout">
      <div class="readout-card">
        <span class="readout-label label-x">X</span>
        <span class="readout-value" id="val-x">—</span>
        <span class="readout-unit">rad/s</span>
      </div>
      <div class="readout-card">
        <span class="readout-label label-y">Y</span>
        <span class="readout-value" id="val-y">—</span>
        <span class="readout-unit">rad/s</span>
      </div>
      <div class="readout-card">
        <span class="readout-label label-z">Z</span>
        <span class="readout-value" id="val-z">—</span>
        <span class="readout-unit">rad/s</span>
      </div>
      <div class="readout-card">
        <span class="readout-label label-peak">Peak</span>
        <span class="readout-value" id="val-peak">—</span>
        <span class="readout-unit">rad/s</span>
      </div>
    </div>

    <div class="divider"></div>

    <section class="chart-section">
      <div class="section-header">
        <span class="section-title">X / Y / Z</span>
        <span class="section-sub">rotation rate over time</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-xyz"></canvas>
      </div>
    </section>

    <div class="divider"></div>

    <section class="chart-section">
      <div class="section-header">
        <span class="section-title">Magnitude</span>
        <span class="section-sub">combined rotation rate over time</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-mag"></canvas>
      </div>
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="gyroscope.js"></script>
</body>
</html>
